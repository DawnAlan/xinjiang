spring:
  application:
    name: cj-gateway-app
  profiles:
    active: dev
  main:
    allow-bean-definition-overriding: true
    web-application-type: reactive
  cloud:
    nacos:
      config:
        server-addr: 192.168.66.51:8848
        namespace: cj-cloud-2x-${spring.profiles.active}
        group: ${spring.profiles.active}
        prefix: ${spring.application.name}
        file-extension: yaml
        username: nacos
        password: nacos
    gateway:
      x-forwarded:
        prefix-enabled: false